name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: quill-linux
            dist_name: quill
          - os: windows-latest
            artifact: quill-windows
            dist_name: quill

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Qt platform deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0

      - name: Build with PyInstaller
        working-directory: desktop
        run: pyinstaller quill.spec

      - name: Zip artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cd desktop/dist
          zip -r ../../${{ matrix.artifact }}.zip ${{ matrix.dist_name }}/

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          cd desktop/dist
          Compress-Archive -Path ${{ matrix.dist_name }}/ -DestinationPath ../../${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          retention-days: 30

  flatpak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtimes
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtimes-kde-6.9-${{ hashFiles('python3-deps.json') }}

      - name: Install Flatpak runtimes
        run: |
          flatpak install --user --noninteractive flathub \
            org.kde.Platform//6.9 \
            org.kde.Sdk//6.9 \
            io.qt.PySide.BaseApp//6.9

      - name: Build Flatpak
        run: |
          flatpak-builder --user --install --force-clean \
            build-dir io.github.khedron83.Quill.yml

      - name: Create bundle
        run: |
          flatpak build-bundle \
            ~/.local/share/flatpak/repo \
            quill.flatpak \
            io.github.khedron83.Quill \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quill-flatpak
          path: quill.flatpak
          retention-days: 30

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.9

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quill-android
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  release:
    needs: [build, flatpak, android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.flatpak
            artifacts/**/*.apk
          generate_release_notes: true
