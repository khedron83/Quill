<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2b6e"/>
      <stop offset="100%" stop-color="#10163a"/>
    </linearGradient>
    <linearGradient id="vane-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dce8f5"/>
      <stop offset="100%" stop-color="#eef4fc"/>
    </linearGradient>
    <linearGradient id="nib" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Feather group with drop shadow -->
  <g filter="url(#shadow)">

    <!-- Right (outer / fuller) vane -->
    <path d="M 338 98
             C 415 132 432 225 406 300
             C 385 358 332 396 268 412
             L 255 390
             C 320 368 370 325 390 268
             C 412 203 396 138 338 98 Z"
          fill="url(#vane-r)"/>

    <!-- Left (inner / thinner) vane -->
    <path d="M 338 98
             C 302 124 274 178 259 242
             C 244 300 250 358 268 412
             L 255 390
             C 242 346 238 286 252 230
             C 266 170 296 126 338 98 Z"
          fill="#b8cedf"/>

    <!-- Rachis / central spine -->
    <line x1="338" y1="98" x2="252" y2="400"
          stroke="#ccdaeb" stroke-width="5" stroke-linecap="round"/>

    <!-- Calamus (bare shaft below vane, leading to nib) -->
    <path d="M 252 400 C 230 408 205 416 168 432"
          stroke="#b0c4d8" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Nib -->
    <path d="M 256 394 L 148 436 L 222 414 Z" fill="url(#nib)"/>

  </g>

  <!-- Ink dot at nib tip -->
  <circle cx="152" cy="434" r="7" fill="#92400e" opacity="0.8"/>

  <!-- Subtle barb separations on right vane (visible at larger sizes) -->
  <g stroke="#c8daea" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
    <line x1="345" y1="115" x2="392" y2="158"/>
    <line x1="368" y1="162" x2="410" y2="198"/>
    <line x1="383" y1="212" x2="418" y2="244"/>
    <line x1="387" y1="263" x2="414" y2="291"/>
    <line x1="376" y1="312" x2="394" y2="340"/>
    <line x1="349" y1="358" x2="360" y2="382"/>
  </g>
</svg>
