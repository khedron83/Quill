app-id: io.github.khedron83.Quill
base: io.qt.PySide.BaseApp
base-version: '6.9'
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: quill
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home
  - --device=dri

modules:

  # ── Python pip dependencies (PySide6 comes from the BaseApp) ────────────────
  # Regenerate with:
  #   python3 -m flatpak_pip_generator \
  #     --runtime org.kde.Sdk//6.9 \
  #     --prefer-wheels lxml,charset-normalizer \
  #     caldav requests \
  #     -o python3-deps.json
  - python3-deps.json

  # ── Quill ──────────────────────────────────────────────────────────────────
  - name: quill
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-build-isolation .
      - install -Dm644 desktop/src/resources/icon.svg
          /app/share/icons/hicolor/scalable/apps/io.github.khedron83.Quill.svg
      - install -Dm644 io.github.khedron83.Quill.desktop
          /app/share/applications/io.github.khedron83.Quill.desktop
      - install -Dm644 io.github.khedron83.Quill.metainfo.xml
          /app/share/metainfo/io.github.khedron83.Quill.metainfo.xml
    sources:
      - type: dir
        path: .
